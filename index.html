<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-CHAT Pro | Connect</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #0078ff; --danger: #ff3b30; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
        
        .connection-panel { background: white; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; border-bottom: 2px solid #ddd; }
        .id-box { padding: 8px; background: #e3f2fd; border-radius: 5px; border: 1px dashed var(--primary); font-weight: bold; color: var(--primary); }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        
        #chat-area { flex: 1; background: white; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #messages { flex: 1; padding: 15px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .sent { background: var(--primary); color: white; align-self: flex-end; }
        .received { background: #eee; color: #333; align-self: flex-start; }

        #video-area { flex: 1.5; background: #1a1a1a; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { width: 25%; height: auto; position: absolute; top: 10px; right: 10px; border: 2px solid white; border-radius: 8px; z-index: 10; }

        .controls { position: absolute; bottom: 20px; display: flex; gap: 10px; z-index: 20; }
        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-call { background: var(--success); color: white; }
        .btn-copy { background: #6c757d; color: white; }
        .btn-screen { background: #5856d6; color: white; }
        .btn-cut { background: var(--danger); color: white; display: none; }
    </style>
</head>
<body>

<header>I-CHAT: Connect & Share</header>

<div class="connection-panel">
    <div>Meri ID: <span id="my-id" class="id-box">Connecting...</span></div>
    <button class="btn-copy" onclick="copyInviteLink()">🔗 Link Copy</button>
    <input type="text" id="friend-id" placeholder="Dost ki ID daalein" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
    <button class="btn-call" id="start-btn" onclick="startCall()">📞 Call / Connect</button>
</div>

<div class="main-layout">
    <section id="chat-area">
        <div id="messages"></div>
        <div style="padding: 10px; display: flex; gap: 5px; border-top: 1px solid #eee;">
            <input type="text" id="msg-input" placeholder="Message..." style="flex:1; padding: 10px;">
            <button onclick="sendMsg()" style="background: var(--primary); color:white;">Bhejein</button>
        </div>
    </section>

    <section id="video-area">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn-screen" onclick="shareScreen()">🖥️ Screen Share</button>
            <button class="btn-cut" id="cut-btn" onclick="endCall()">🛑 End Call</button>
        </div>
    </section>
</div>

<script>
    const myIdDisplay = document.getElementById('my-id');
    const friendIdInput = document.getElementById('friend-id');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msg-input');
    const cutBtn = document.getElementById('cut-btn');

    let peer = new Peer();
    let conn;
    let currentCall;
    let localStream;

    peer.on('open', id => { myIdDisplay.innerText = id; checkURLForID(); });

    // Incoming Chat
    peer.on('connection', c => {
        conn = c;
        setupChat();
    });

    // Incoming Call
    peer.on('call', async (call) => {
        if(confirm("Dost ki call aa rahi hai, uthayein?")) {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            handleCall(call, stream);
        }
    });

    async function startCall() {
        const friendId = friendIdInput.value;
        if(!friendId) return alert("ID daalein!");
        
        conn = peer.connect(friendId);
        setupChat();

        const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        const call = peer.call(friendId, stream);
        handleCall(call, stream);
    }

    function handleCall(call, stream) {
        currentCall = call;
        localStream = stream;
        document.getElementById('local-video').srcObject = stream;
        cutBtn.style.display = "block";

        call.answer(stream);
        call.on('stream', remoteStream => {
            document.getElementById('remote-video').srcObject = remoteStream;
        });
        
        call.on('close', () => endCall());
    }

    async function shareScreen() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            if (currentCall) {
                let videoTrack = screenStream.getVideoTracks()[0];
                let sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(videoTrack);
                
                // Jab screen share stop ho jaye to wapas camera par aa jaye
                videoTrack.onended = async () => {
                    const camStream = await navigator.mediaDevices.getUserMedia({video: true});
                    sender.replaceTrack(camStream.getVideoTracks()[0]);
                };
            }
        } catch (err) { console.error("Screen share cancel: " + err); }
    }

    function endCall() {
        if (currentCall) currentCall.close();
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('local-video').srcObject = null;
        cutBtn.style.display = "none";
        addMessage("Call ended.", "received");
    }

    function setupChat() {
        conn.on('data', data => addMessage(data, 'received'));
        addMessage("Connected!", "received");
    }

    function sendMsg() {
        const msg = msgInput.value;
        if(conn && msg) {
            conn.send(msg);
            addMessage(msg, 'sent');
            msgInput.value = "";
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function copyInviteLink() {
        const link = window.location.href.split('?')[0] + "?id=" + myIdDisplay.innerText;
        navigator.clipboard.writeText(link);
        alert("Invite Link Copy Ho Gaya!");
    }

    function checkURLForID() {
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('id');
        if(joinId) friendIdInput.value = joinId;
    }
</script>
</body>
</html>
